# LABYRINTH Configuration
# Authors: DaxxSec & Claude (Anthropic)
# Copy to labyrinth.yaml and customize for your deployment.

# Operational mode
# - adversarial: default reverse kill chain (degrade/disrupt/control)
# - kohlberg: moral development mode (mirror/reflect/guide)
#   See docs/ETHICS.md for the ethical framework governing Kohlberg mode.
mode: adversarial

# Kohlberg mode settings (ignored when mode is adversarial)
kohlberg:
  # Starting transition level (1 = start from Stage 1->2 scenarios)
  start_level: 1
  # Maximum scenarios to present before ending session
  max_scenarios: 15
  # Silent agent solicitation timeout (seconds)
  solicitation_timeout: 5
  # Enable contextual adaptation of scenarios to agent's actual targets
  adapt_scenarios: true
  # Report formats to generate
  report_formats:
    - terminal
    - markdown
    - json

# Swarm detection (Kohlberg mode only)
# Detects coordinated multi-agent attacks and enables cross-agent
# moral context in GUIDE enrichment prompts.
swarm:
  enabled: true
  # Time window for session correlation (seconds)
  window_seconds: 60
  # Minimum sessions within window to trigger swarm detection
  min_sessions: 3
  # Enable cross-pollination: reference other agents' moral state
  # in GUIDE enrichment ("your teammate stopped...")
  cross_pollinate: true

layer0:
  encryption:
    algorithm: AES-256-GCM
    key_source: vault  # vault | env | file
  network:
    honeypot_vlan: 100
    production_route: deny
  proxy:
    validate_scope_on_startup: true
    fail_mode: closed
  retention:
    credentials_days: 7
    fingerprints_days: 90
    decision_logs: indefinite

layer1:
  honeypot_services:
    - type: ssh
      port: 22
      template: ubuntu-22.04-staged
    - type: http
      port: 8080
      template: nginx-vulnerable
  container:
    runtime: docker  # docker | podman
    network_mode: bridge
    egress_proxy: true

layer2:
  adaptive: true
  contradiction_density: medium  # low | medium | high
  max_container_depth: 5

layer3:
  activation: on_escalation  # on_connect | on_escalation | manual
  corruption_method: bashrc_payload

layer4:
  mode: auto  # auto | manual (Burp-style intercept)
  default_swap: passive  # passive | neutralize | double_agent | counter_intel
  log_original_prompts: true

siem:
  enabled: true
  endpoint: https://siem.internal/api/events
  alert_prefix: LABYRINTH
